services:
  db:
    image: postgres:16.3
    environment:
      POSTGRES_DB: practica
      POSTGRES_USER: practica
      POSTGRES_PASSWORD: practica
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practica -d practica"]
      interval: 5s
      timeout: 5s
      retries: 20

  tomcat:
    image: tomcat:10.1-jdk21
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/app.war:/usr/local/tomcat/webapps/app.war:ro
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: practica
      DB_USER: practica
      DB_PASS: practica

volumes:
  dbdata: